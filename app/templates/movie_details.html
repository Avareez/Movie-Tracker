<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.title }}</title>
</head>

<body>
    <h1>{{ movie.title }}</h1>
    {% if movie.poster_url %}
    <img src="{{ movie.poster_url }}" alt="{{ movie.title }} poster" width="200">
    {% else %}
    <div
        style="width: 200px; height: 300px; background-color: #ccc; display: flex; align-items: center; justify-content: center;">
        No Image
    </div>
    {% endif %}
    <p><strong>Release Date:</strong>
        {% if movie.release_date %}
        {{ movie.release_date }}
        {% else %}
        N/A
        {% endif %}
    </p>
    <p><strong>Overview:</strong> {{ movie.overview or "No overview available." }}</p>
</body>

</html>
