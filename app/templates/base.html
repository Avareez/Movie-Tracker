<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MovieVerse{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>
    <nav class="navbar">
        <a href="{{ url_for('main.index') }}" class="navbar-brand">
            <i data-lucide="film"></i> MovieVerse
        </a>
        <div class="navbar-links">
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('main.user_movies', user_id=current_user.id) }}" class="btn-outline">
                <i data-lucide="list"></i> My List
            </a>
            <span class="navbar-username">
                <i data-lucide="user"></i> {{ current_user.username }}
            </span>
            <a href="{{ url_for('auth.logout') }}" class="btn-outline">
                <i data-lucide="log-out"></i> Logout
            </a>
            {% else %}
            <a href="{{ url_for('auth.login') }}" class="btn-outline">Login</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script>lucide.createIcons();</script>
</body>

</html>
